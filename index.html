<html lang="en">

<title>WorkTetris v3.0</title>
<style>
:root{--bg:#08111f;--panel:#101b2f;--panel2:#0d1728;--text:#e5e7eb;--muted:#94a3b8;--blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;--line:rgba(148,163,184,.18)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#1d2940,#08111f 48%,#020617);color:var(--text)}button,input,select,textarea{font:inherit;border:1px solid var(--line);border-radius:13px;background:#071120;color:var(--text);padding:10px;max-width:100%;min-width:0}button{cursor:pointer;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);border:0}button.ghost{background:rgba(148,163,184,.1);color:var(--muted);border:1px solid var(--line)}button.danger{background:rgba(239,68,68,.16);color:#fecaca;border:1px solid rgba(239,68,68,.3)}header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;padding:22px 32px 10px}h1{margin:0;font-size:34px;letter-spacing:-.04em}.subtitle{color:var(--muted);max-width:760px;margin-top:5px}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chipbtn,.backup{font-size:12px;border-radius:999px;padding:8px 10px}.backup.good{background:rgba(34,197,94,.16);color:#bbf7d0}.backup.warn{background:rgba(245,158,11,.15);color:#fde68a}.backup.bad{background:rgba(239,68,68,.16);color:#fecaca}.wrap{padding:12px 32px 32px;display:grid;gap:14px}.panel,.stat{background:rgba(15,23,42,.78);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 55px rgba(0,0,0,.2)}.heat{padding:12px 14px;overflow-x:auto}.heat-head{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:8px}.week{display:grid;grid-template-columns:repeat(3,1fr);font-size:11px;color:var(--muted);margin-bottom:6px}.strip{display:grid;grid-template-columns:repeat(21,minmax(26px,1fr));gap:6px}.day{height:48px;border-radius:10px;border:1px solid var(--line);background:rgba(148,163,184,.08);padding:5px;display:grid;grid-template-rows:auto 1fr}.day.today{outline:2px solid rgba(56,189,248,.7)}.day-num{font-size:10px;color:var(--muted)}.dots{display:grid;grid-template-columns:repeat(3,6px);grid-auto-rows:6px;gap:3px;place-content:center}.dot{width:6px;height:6px;border-radius:2px;background:var(--blue)}.dot.low{background:var(--green)}.dot.high{background:var(--amber)}.dot.critical{background:var(--red)}.l1{background:rgba(34,197,94,.18)}.l2{background:rgba(245,158,11,.24)}.l3{background:rgba(239,68,68,.3)}.l4{background:rgba(239,68,68,.48)}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.stat{text-align:center;padding:11px}.stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.stat b{display:block;font-size:24px;margin-top:3px}.stat span{display:block;color:var(--muted);font-size:11px}.grid{display:grid;grid-template-columns:1.55fr .75fr;gap:16px;align-items:start}.tabs{display:flex;gap:6px;justify-content:center;padding:10px 12px 4px;overflow-x:auto}.tab{width:auto;background:transparent;color:var(--muted);border:1px solid transparent;padding:7px 10px;border-radius:999px;font-size:12px}.tab.active{color:white;background:rgba(59,130,246,.18);border-color:rgba(96,165,250,.28)}.view{display:none;padding:8px 12px 14px}.view.active{display:block}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px;color:var(--muted);font-size:13px}.toolbar-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.task-list,.agenda-list{display:grid;gap:8px}.task,.agenda-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border-radius:16px;background:rgba(15,23,42,.9);border-top:1px solid var(--line);border-bottom:1px solid var(--line);border-left:5px solid var(--blue);border-right:5px solid var(--blue)}.task.child{margin-left:52px;background:rgba(15,23,42,.65);position:relative}.task.child:before{content:'↳';position:absolute;left:-34px;top:18px;color:var(--muted)}.priority-low{border-left-color:var(--green);border-right-color:var(--green)}.priority-medium{border-left-color:var(--blue);border-right-color:var(--blue)}.priority-high{border-left-color:var(--amber);border-right-color:var(--amber)}.priority-critical{border-left-color:var(--red);border-right-color:var(--red)}.title{font-weight:850}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.pill{font-size:11px;padding:5px 7px;border-radius:999px;background:rgba(148,163,184,.12);color:var(--muted)}.pill.red{color:#fecaca;background:rgba(239,68,68,.16)}.pill.amber{color:#fde68a;background:rgba(245,158,11,.15)}.pill.blue{color:#bae6fd;background:rgba(56,189,248,.14)}.pill.green{color:#bbf7d0;background:rgba(34,197,94,.14)}.pill.purple{color:#ddd6fe;background:rgba(167,139,250,.15)}.actions{display:flex;gap:6px}.icon{width:36px;height:34px;display:grid;place-items:center;padding:0;border-radius:11px}.sub{color:var(--muted);font-size:12px;margin-top:6px}.side{display:grid;gap:16px}.side h2{font-size:17px;margin:0;padding:14px 15px 0}.inner{padding:13px 15px 15px}.event{border-left:2px solid rgba(56,189,248,.45);padding:0 0 12px 12px;color:var(--muted);font-size:12px}.event b{color:var(--text);display:block}.barrow{display:grid;grid-template-columns:90px 1fr 45px;gap:8px;align-items:center;color:var(--muted);font-size:12px;margin-bottom:8px}.track{height:12px;background:rgba(148,163,184,.12);border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#38bdf8,#a78bfa)}.well{height:180px;display:flex;align-items:flex-end;gap:5px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#071120}.block{width:23px;min-height:20px;border-radius:7px;background:var(--blue)}.block.low{background:var(--green)}.block.high{background:var(--amber)}.block.critical{background:var(--red)}.block.waiting{background:var(--purple)}.empty{color:var(--muted);padding:12px;border:1px dashed var(--line);border-radius:14px}dialog{border:1px solid var(--line);border-radius:22px;background:#0f172a;color:var(--text);width:min(520px,calc(100vw - 24px));max-height:86vh;overflow:auto;box-shadow:0 30px 90px rgba(0,0,0,.55);position:fixed;inset:0;margin:auto}dialog::backdrop{background:rgba(2,6,23,.72);backdrop-filter:blur(6px)}.modal{display:grid;gap:10px;margin-top:12px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}label{color:var(--muted)}body.compact .subtitle,body.compact .heat,body.compact .stats,body.compact .tabs,body.compact .side{display:none}body.compact .grid{grid-template-columns:1fr}body.compact .view{display:none}body.compact #view-tasks{display:block}body.compact .panel{box-shadow:none}@media(max-width:900px){.grid{grid-template-columns:1fr}.side{display:none}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:720px){body{font-size:15px;overflow-x:hidden}header{display:block;padding:16px 14px 8px}h1{font-size:30px}.subtitle{font-size:14px;line-height:1.35}.top-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.backup{grid-column:span 3}.wrap{padding:8px 12px 88px}.heat{padding:10px}.heat-head span:last-child{display:none}.week{width:max-content;min-width:100%;grid-template-columns:repeat(3,150px)}.strip{grid-template-columns:repeat(21,44px);width:max-content;min-width:100%}.stats{grid-template-columns:repeat(2,1fr)}.tabs{position:sticky;bottom:0;z-index:10;background:rgba(8,17,31,.94);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:22px;padding:8px;justify-content:space-around}.tab{font-size:13px;min-width:70px}.toolbar{display:grid;grid-template-columns:1fr;align-items:stretch}.toolbar-left{display:grid}.toolbar span{display:none}.toolbar button,#filter{width:100%}.task,.agenda-item{grid-template-columns:1fr}.task.child{margin-left:22px}.task.child:before{left:-18px}.actions{justify-content:flex-end}.icon{width:40px;height:38px}dialog{width:calc(100vw - 18px);max-height:88vh;inset:10px 9px auto 9px;margin:0 auto;padding:14px}.modal-actions{position:sticky;bottom:0;background:#0f172a;padding-top:10px}}
</style>
</head>
<body>
<header><div><h1>WorkTetris</h1><div class="subtitle">A compact task command centre where work stacks up by due date, priority and dependency — then drops out when completed.</div></div><div class="top-actions"><span id="backup" class="backup bad">Backup: never</span><button class="ghost chipbtn" id="compact">Compact</button><button class="ghost chipbtn" id="help">Help</button><button class="ghost chipbtn" id="export">Export backup</button><button class="ghost chipbtn" id="import">Import</button><button class="ghost chipbtn" id="demo">Load demo</button><input id="file" type="file" accept="application/json,.json" hidden></div></header>
<main class="wrap"><section id="heat" class="panel heat"></section><section id="stats" class="stats"></section><section class="grid"><section class="panel"><nav class="tabs"><button class="tab active" data-view="tasks">Tasks</button><button class="tab" data-view="agenda">Agenda</button><button class="tab" data-view="activity">Activity</button><button class="tab" data-view="load">Load</button><button class="tab" data-view="wins">Wins</button></nav><div class="view active" id="view-tasks"><div class="toolbar"><div class="toolbar-left"><button id="add">Add task +</button><span>Sorted by due date, then priority.</span></div><select id="filter"><option value="open" selected>Open only</option><option value="all">All open + done</option><option value="me">Depends on me</option><option value="person">Waiting on person</option><option value="date">Waiting on date</option><option value="system">Waiting on system</option><option value="blocked">Blocked</option><option value="done">Done</option></select></div><div id="tasks" class="task-list"></div></div><div class="view" id="view-agenda"><div id="agenda"></div></div><div class="view" id="view-activity"><div id="activity"></div></div><div class="view" id="view-load"><div id="mainWell" class="well"></div><div id="mainLoad" class="inner"></div></div><div class="view" id="view-wins"><div id="wins"></div></div></section><aside class="side"><section class="panel"><h2>Timeline</h2><div class="inner" id="sideActivity"></div></section><section class="panel"><h2>Load stack</h2><div class="inner"><div id="well" class="well"></div></div></section><section class="panel"><h2>Workload</h2><div class="inner" id="sideLoad"></div></section></aside></section></main>
<dialog id="dlg"><h2 id="dlgTitle">Task</h2><div class="modal"><input id="title" placeholder="Task title"><select id="parent"></select><select id="dep"><option value="me">Depends on me</option><option value="person">Waiting on person</option><option value="date">Waiting on date</option><option value="system">Waiting on system</option><option value="blocked">Blocked</option><option value="done">Done</option></select><select id="pri"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select><input id="due" type="date" title="Due date"><select id="eff"><option value="15">15 mins</option><option value="30" selected>30 mins</option><option value="60">1 hour</option><option value="120">2 hours</option><option value="240">Half day</option><option value="480">Full day</option></select><input id="start" type="date" title="Planned start"><input id="end" type="date" title="Planned end"><label><input id="locked" type="checkbox"> Lock planned dates</label><textarea id="notes" rows="4" placeholder="Notes / evidence / context"></textarea><input id="waiting" placeholder="Waiting on / person / system"><input id="sub" placeholder="Add sub-action and press Save"><label><input id="ach" type="checkbox"> Mark as achievement evidence</label></div><div class="modal-actions"><button class="ghost" id="cancel">Cancel</button><button id="save">Save</button></div></dialog>
<script>
const $=id=>document.getElementById(id),KEY='worktetris-v3',BKEY='worktetris-backup',CKEY='worktetris-compact';let tasks=[],editing=null;try{tasks=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{tasks=[]}const labels={me:'Me',person:'Person',date:'Date',system:'System',blocked:'Blocked',done:'Done'};
function store(){localStorage.setItem(KEY,JSON.stringify(tasks));render()}function today(){return new Date().toISOString().slice(0,10)}function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function fmt(d){return d?new Date(d+'T12:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'}):'No date'}function esc(s){return String(s||'')}function overdue(t){return t.dependency!=='done'&&t.dueDate&&t.dueDate<today()}function daysAgo(d){return(Date.now()-new Date(d).getTime())/86400000}function event(t,text,type='info'){t.events=t.events||[];t.events.unshift({text,type,at:new Date().toISOString()})}function clear(el){el.innerHTML=''}function el(tag,cls,txt){let e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e}function weight(p){return{low:1,medium:2,high:3,critical:4}[p]||2}function sort(list){return list.slice().sort((a,b)=>(a.dependency==='done')-(b.dependency==='done')||(a.dueDate||'9999').localeCompare(b.dueDate||'9999')||weight(b.priority)-weight(a.priority))}function chip(parent,cls,text){parent.appendChild(el('span','pill '+cls,text))}function children(pid){return tasks.filter(t=>t.parentId===pid)}function titleOf(i){return(tasks.find(t=>t.id===i)||{}).title||''}
function populateParent(selected='',exclude=''){let p=$('parent');clear(p);let o=new Option('No parent task','');p.add(o);sort(tasks.filter(t=>t.id!==exclude&&!t.parentId)).forEach(t=>p.add(new Option('Parent: '+t.title,t.id)));p.value=selected}
function openAdd(){editing=null;$('dlgTitle').textContent='Add task';['title','due','start','end','notes','waiting','sub'].forEach(i=>$(i).value='');populateParent();$('dep').value='me';$('pri').value='medium';$('eff').value='30';$('locked').checked=false;$('ach').checked=false;$('dlg').showModal()}
function openEdit(i){let t=tasks.find(x=>x.id===i);if(!t)return;editing=i;$('dlgTitle').textContent='Edit task';populateParent(t.parentId||'',t.id);$('title').value=t.title;$('dep').value=t.dependency;$('pri').value=t.priority;$('due').value=t.dueDate||'';$('eff').value=t.effortMinutes||30;$('start').value=t.plannedStart||'';$('end').value=t.plannedEnd||'';$('locked').checked=!!t.planLocked;$('notes').value=t.notes||'';$('waiting').value=t.waitingOn||'';$('sub').value='';$('ach').checked=!!t.achievement;$('dlg').showModal()}
function saveTask(){let title=$('title').value.trim();if(!title)return;let t=editing?tasks.find(x=>x.id===editing):{id:id(),createdAt:new Date().toISOString(),completedAt:null,subactions:[],events:[]};let old=t.dependency;t.title=title;t.parentId=$('parent').value;t.dependency=$('dep').value;t.priority=$('pri').value;t.dueDate=$('due').value;t.effortMinutes=+$('eff').value;t.plannedStart=$('start').value;t.plannedEnd=$('end').value;t.planLocked=$('locked').checked;t.notes=$('notes').value.trim();t.waitingOn=$('waiting').value.trim();t.achievement=$('ach').checked;if(t.dependency==='done'&&old!=='done')t.completedAt=new Date().toISOString();if(t.dependency!=='done')t.completedAt=null;let sub=$('sub').value.trim();if(sub)t.subactions.push({id:id(),title:sub,done:false,auto:false});event(t,(editing?'Updated task: ':'Added task: ')+t.title,editing?'info':'info');if(!editing)tasks.unshift(t);$('dlg').close();editing=null;store()}
function complete(i){let t=tasks.find(x=>x.id===i);if(!t)return;t.dependency='done';t.completedAt=new Date().toISOString();event(t,'Completed: '+t.title,'done');store()}function reopen(i){let t=tasks.find(x=>x.id===i);if(!t)return;t.dependency='me';t.completedAt=null;event(t,'Reopened: '+t.title);store()}function removeTask(i){if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==i);store()}}
function renderBackup(){let b=$('backup'),last=localStorage.getItem(BKEY);b.className='backup';if(!last){b.textContent='Backup: never';b.classList.add('bad');return}let age=(Date.now()-new Date(last))/3600000,label=new Date(last).toLocaleString(undefined,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});b.textContent='Backup: '+label+(age>72?' · stale':age>24?' · ageing':'');b.classList.add(age>72?'bad':age>24?'warn':'good')}
function exportBackup(){let blob=new Blob([JSON.stringify({app:'WorkTetris',version:'3.0',exportedAt:new Date().toISOString(),tasks},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='worktetris-backup-'+today()+'.json';a.click();URL.revokeObjectURL(url);localStorage.setItem(BKEY,new Date().toISOString());render()}
function importBackup(f){if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result),imp=Array.isArray(data)?data:data.tasks;if(!Array.isArray(imp))return alert('Not a WorkTetris backup.');let replace=confirm(['Import '+imp.length+' tasks.','','OK = replace everything.','Cancel = merge with existing tasks.'].join(String.fromCharCode(10)));if(replace)tasks=imp;else{let seen={};tasks.forEach(t=>seen[t.id]=1);imp.forEach(t=>{if(!seen[t.id])tasks.push(t)})}localStorage.setItem(BKEY,new Date().toISOString());store()}catch(e){alert('Import failed: '+e.message)}};r.readAsText(f)}
function renderStats(){let open=tasks.filter(t=>t.dependency!=='done'),done=tasks.filter(t=>t.dependency==='done'),added=tasks.filter(t=>daysAgo(t.createdAt)<=7).length,doneW=done.filter(t=>t.completedAt&&daysAgo(t.completedAt)<=7).length,eff=open.reduce((s,t)=>s+(t.effortMinutes||0),0),wait=open.filter(t=>['person','date','system'].includes(t.dependency)).length,data=[['Open',open.length,open.filter(overdue).length+' overdue'],['Done',done.length,doneW+' this week'],['Added',added,'last 7 days'],['Net',added-doneW,'build-up'],['Effort',(eff/60).toFixed(1)+'h','open'],['Waiting',wait,'not with me']];$('stats').innerHTML=data.map(x=>`<div class="stat"><small>${x[0]}</small><b>${x[1]}</b><span>${x[2]}</span></div>`).join(String.fromCharCode(10))}
function renderHeat(){let box=$('heat'),map={};tasks.filter(t=>t.dependency!=='done'&&t.dueDate).forEach(t=>(map[t.dueDate]??=[]).push(t));box.innerHTML='';let head=el('div','heat-head');head.append(el('span','', 'Due-date pressure · next 3 weeks'),el('span','','Always-on radar'));box.append(head);let now=new Date(today()+'T12:00:00'),week=el('div','week');for(let i=0;i<3;i++){let d=new Date(now);d.setDate(now.getDate()+i*7);week.append(el('span','',d.toLocaleDateString(undefined,{month:'short',day:'numeric'})))}box.append(week);let strip=el('div','strip');for(let i=0;i<21;i++){let d=new Date(now);d.setDate(now.getDate()+i);let iso=d.toISOString().slice(0,10),list=map[iso]||[],mins=list.reduce((s,t)=>s+(t.effortMinutes||0),0),lvl=list.length===0?0:list.length===1&&mins<=60?1:list.length<=2&&mins<=180?2:list.length<=4&&mins<=360?3:4,cell=el('div','day l'+lvl+(iso===today()?' today':''));cell.title=(list.map(t=>t.title).join(' | ')||'No tasks due');cell.append(el('div','day-num',String(d.getDate())));let dots=el('div','dots');list.slice(0,8).forEach(t=>dots.append(el('span','dot '+t.priority)));cell.append(dots);strip.append(cell)}box.append(strip)}
function renderTasks(){let f=$('filter').value,list=tasks;if(f==='open')list=tasks.filter(t=>t.dependency!=='done'||(t.parentId&&tasks.find(p=>p.id===t.parentId&&p.dependency!=='done')));else if(f!=='all')list=tasks.filter(t=>t.dependency===f);let ids=list.map(t=>t.id),ordered=[];sort(list).filter(t=>!t.parentId||!ids.includes(t.parentId)).forEach(p=>{ordered.push({t:p,c:!!p.parentId});sort(list.filter(x=>x.parentId===p.id)).forEach(ch=>ordered.push({t:ch,c:true}))});let box=$('tasks');clear(box);if(!ordered.length)return box.append(el('div','empty','No tasks match this view'));ordered.forEach(({t,c})=>{let row=el('div','task priority-'+t.priority+(c?' child':'')),main=el('div'),meta=el('div','meta');main.append(el('div','title',t.title));chip(meta,priorityClass(t.priority),t.priority.toUpperCase());chip(meta,depClass(t.dependency),labels[t.dependency]);chip(meta,'',t.effortMinutes+'m');chip(meta,overdue(t)?'red':'',(overdue(t)?'⚠ Overdue · ':'📅 Due ')+fmt(t.dueDate));if(t.plannedStart||t.plannedEnd)chip(meta,t.planLocked?'green':'blue',(t.planLocked?'🔒 Plan ':'🗓 Plan ')+fmt(t.plannedStart)+' → '+fmt(t.plannedEnd));if(t.parentId)chip(meta,'purple','Child of: '+titleOf(t.parentId));let kids=children(t.id);if(kids.length)chip(meta,'purple','Subtasks '+kids.filter(k=>k.dependency==='done').length+'/'+kids.length);if(t.waitingOn)chip(meta,'amber','Waiting: '+t.waitingOn);if(t.achievement)chip(meta,'green','Achievement');main.append(meta);if(t.subactions?.length){let s=el('div','sub');s.textContent=t.subactions.map(x=>'↳ '+x.title+' · '+(x.done?'Done':'Open')).join(String.fromCharCode(10));main.append(s)}let act=el('div','actions'),e=el('button','icon ghost','✎'),d=el('button','icon','✓'),r=el('button','icon danger','🗑');e.onclick=()=>openEdit(t.id);d.textContent=t.dependency==='done'?'↩':'✓';d.onclick=()=>t.dependency==='done'?reopen(t.id):complete(t.id);r.onclick=()=>removeTask(t.id);act.append(e,d,r);row.append(main,act);box.append(row)})}
function priorityClass(p){return p==='critical'?'red':p==='high'?'amber':p==='low'?'green':'blue'}function depClass(d){return d==='done'?'green':['person','date','system'].includes(d)?'purple':d==='blocked'?'red':'blue'}
function allEvents(){let ev=[];tasks.forEach(t=>(t.events||[]).forEach(e=>ev.push(e)));return ev.sort((a,b)=>new Date(b.at)-new Date(a.at))}function renderActivity(){let html=allEvents().slice(0,80).map(e=>`<div class="event"><b>${e.text}</b>${new Date(e.at).toLocaleString(undefined,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`).join(String.fromCharCode(10))||'<div class="empty">No activity yet</div>';$('activity').innerHTML=html;$('sideActivity').innerHTML=allEvents().slice(0,12).map(e=>`<div class="event"><b>${e.text}</b>${new Date(e.at).toLocaleString(undefined,{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`).join(String.fromCharCode(10))||'<div class="empty">No activity yet</div>'}
function renderLoad(){let groups=[['Me','me'],['People','person'],['Date','date'],['System','system'],['Blocked','blocked']],vals=groups.map(g=>[g[0],tasks.filter(t=>t.dependency===g[1]).reduce((s,t)=>s+(t.effortMinutes||0),0)]),max=Math.max(1,...vals.map(v=>v[1])),html=vals.map(v=>`<div class="barrow"><div>${v[0]}</div><div class="track"><div class="bar" style="width:${v[1]/max*100}%"></div></div><div>${(v[1]/60).toFixed(1)}h</div></div>`).join(String.fromCharCode(10));$('mainLoad').innerHTML=html;$('sideLoad').innerHTML=html;['well','mainWell'].forEach(i=>{let w=$(i);clear(w);sort(tasks.filter(t=>t.dependency!=='done')).slice(0,30).forEach(t=>{let b=el('div','block '+(['person','date','system'].includes(t.dependency)?'waiting':t.priority));b.style.height=Math.max(20,Math.min(130,(t.effortMinutes||30)/2))+'px';w.append(b)})})}
function renderAgenda(){let box=$('agenda');clear(box);let planned=sort(tasks.filter(t=>t.dependency!=='done'&&(t.plannedStart||t.plannedEnd))),todayD=today(),tom=new Date(todayD+'T12:00:00');tom.setDate(tom.getDate()+1);let week=new Date(todayD+'T12:00:00');week.setDate(week.getDate()+6);let groups=[['Today',[]],['Tomorrow',[]],['Next 7 days',[]],['Later',[]]];planned.forEach(t=>{let s=t.plannedStart||t.plannedEnd,d=new Date(s+'T12:00:00');if(s===todayD)groups[0][1].push(t);else if(s===tom.toISOString().slice(0,10))groups[1][1].push(t);else if(d<=week)groups[2][1].push(t);else groups[3][1].push(t)});groups.forEach(g=>{if(!g[1].length)return;box.append(el('div','agenda-heading',g[0]+' · '+g[1].length+' planned'));g[1].forEach(t=>{let item=el('div','agenda-item priority-'+t.priority),m=el('div'),meta=el('div','meta');m.append(el('div','title',t.title));chip(meta,t.planLocked?'green':'blue',(t.planLocked?'🔒 Locked':'🗓 Draft')+' · '+fmt(t.plannedStart)+' → '+fmt(t.plannedEnd));chip(meta,overdue(t)?'red':'','Due '+fmt(t.dueDate));chip(meta,priorityClass(t.priority),t.priority.toUpperCase());m.append(meta);let a=el('div','actions'),e=el('button','icon ghost','✎'),c=el('button','icon','✓');e.onclick=()=>openEdit(t.id);c.onclick=()=>complete(t.id);a.append(e,c);item.append(m,a);box.append(item)})});if(!planned.length)box.append(el('div','empty','No planned work yet'))}
function renderWins(){let list=sort(tasks.filter(t=>t.achievement||t.dependency==='done'));$('wins').innerHTML=list.map(t=>`<div class="agenda-item priority-${t.priority}"><div><div class="title">${esc(t.title)}</div><div class="meta"><span class="pill green">${t.dependency==='done'?'Completed':'Evidence'}</span><span class="pill">${fmt(t.dueDate)}</span></div></div></div>`).join(String.fromCharCode(10))||'<div class="empty">No achievement evidence yet</div>'}
function render(){renderBackup();renderStats();renderHeat();renderTasks();renderActivity();renderLoad();renderAgenda();renderWins()}
function demo(){tasks=[];let base=[['Review tracker','critical','me'],['Send stakeholder update','medium','me'],['Chase supplier','high','person'],['Prepare deck','high','me'],['Wait for export','medium','system'],['Book review','low','date'],['Fix flow failure','critical','blocked']];for(let d=0;d<14;d++)for(let i=0;i<3+Math.floor(Math.random()*4);i++){let b=base[Math.floor(Math.random()*base.length)],t=make(b[0]+' '+(d+1)+'-'+(i+1),b[2],b[1],[15,30,45,60,90,120][Math.floor(Math.random()*6)],d,b[2]==='person'?'Stakeholder':'');if(Math.random()>.5){let s=new Date();s.setDate(s.getDate()+d);t.plannedStart=s.toISOString().slice(0,10);t.plannedEnd=t.dueDate;t.planLocked=Math.random()>.5}event(t,'Added task: '+t.title);tasks.push(t)}if(tasks[1])tasks[1].parentId=tasks[0].id;if(tasks[2])tasks[2].parentId=tasks[0].id;store()}function make(title,dep,pri,mins,days,waiting){let d=new Date();d.setDate(d.getDate()+days);return{id:id(),parentId:'',title,dependency:dep,priority:pri,effortMinutes:mins,dueDate:d.toISOString().slice(0,10),plannedStart:'',plannedEnd:'',planLocked:false,createdAt:new Date().toISOString(),completedAt:null,waitingOn:waiting,notes:'',achievement:false,subactions:[],events:[]}}
function setView(v){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id==='view-'+v));render()}function toggleCompact(){let c=!document.body.classList.contains('compact');document.body.classList.toggle('compact',c);localStorage.setItem(CKEY,c?'1':'0');$('compact').textContent=c?'Full view':'Compact'}function help(){alert(['WorkTetris quick guide','','Add tasks with Add task +.','Use Due date for the deadline.','Use Planned start/end for when you intend to do the work.','Use Parent task to link subtasks under a main task.','Completed tasks are hidden from Open view but recoverable with the filter.','Export backup regularly; Import can replace or merge.'].join(String.fromCharCode(10)))}
$('add').onclick=openAdd;$('save').onclick=saveTask;$('cancel').onclick=()=>$('dlg').close();$('demo').onclick=demo;$('export').onclick=exportBackup;$('import').onclick=()=>$('file').click();$('file').onchange=e=>{importBackup(e.target.files[0]);e.target.value=''};$('compact').onclick=toggleCompact;$('help').onclick=help;$('filter').onchange=renderTasks;document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setView(t.dataset.view));if(localStorage.getItem(CKEY)==='1'){document.body.classList.add('compact');$('compact').textContent='Full view'}render();
</script>
